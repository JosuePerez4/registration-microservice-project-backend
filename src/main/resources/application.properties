# API configuration
spring.application.name=registration-service
spring.config.import=optional:file:.env[.properties],optional:file:${user.dir}/.env[.properties]
server.port=${SERVER_PORT}

# Database configuration
spring.datasource.url=${DB_URL}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.show-extensions=true
springdoc.swagger-ui.try-it-out-enabled=true

# JWT (clave pública RSA; en .env define JWT_PUBLIC_KEY con el cuerpo base64 del SPKI)
jwt.public.key=-----BEGIN PUBLIC KEY-----\n${JWT_PUBLIC_KEY}\n-----END PUBLIC KEY-----

# Backblaze B2 (S3-compatible API); valores en .env (BACKBLAZE_*)
backblaze.endpoint=${BACKBLAZE_ENDPOINT}
backblaze.region=${BACKBLAZE_REGION}
backblaze.bucket-name=${BACKBLAZE_BUCKET_NAME}
backblaze.access-key=${BACKBLAZE_ACCESS_KEY}
backblaze.secret-key=${BACKBLAZE_SECRET_KEY}

# Multipart (comprobante de pago)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# Eureka config
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL}
eureka.instance.prefer-ip-address=true

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always